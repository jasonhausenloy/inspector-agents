id: no-frontier-training
version: 1
title: "No training runs above 1e25 FLOP; no inference above 1e24 FLOP per job"
rationale: >
  Mirrors the EU AI Act GPAI threshold and US EO 14110's training-compute
  reporting bar. The Prover commits not to cross these caps on any single
  logical run without 60-day prior notice to the Verifier.

# NOTE: thresholds here are demo-scaled (1e19 / 1e18) so evasions produce
# traces that fit in context and cross the cap with a realistic mutation.
# Production would use the EU AI Act GPAI threshold (1e25) with the same logic.
deterministic_rules:
  - kind: aggregate_flop_cap
    op_type: training
    scope: per_job
    threshold: 1.0e19
  - kind: aggregate_flop_cap
    op_type: inference
    scope: per_job
    threshold: 1.0e18
  - kind: forbidden_data_source_tags
    tags: ["corpus:bioweapon-synthesis", "corpus:cbrn-*", "corpus:weapons-uplift-*"]
  - kind: require_upstream_refs
  - kind: batch_token_consistency
    max_capacity_ratio: 5

  # Completeness commitment — closes the chronological-tail-drop attack class
  # discovered by the redteam loop on 2026-04-25. Prover commits ahead of time
  # to the (window_range × chip_inventory) for this audit. Submission must
  # contain a record for every (chip, minute) slot. Missing slots = truncation.
  - kind: window_completeness
    expected_window_start: "2026-04-24T09:00:00Z"
    expected_window_end:   "2026-04-24T09:30:00Z"
    expected_chips:
      - gpu-us-west-2-0000
      - gpu-us-west-2-0001
      - gpu-us-west-2-0002
      - gpu-us-west-2-0003
    window_seconds: 60

  # Model-hash consistency commitment — closes the model-hash-midpoint-split
  # attack class discovered by the redteam loop (round 9, 2026-04-25). Within a
  # (job_id, operator, code_commit) tuple, model_hash_prefix may not change
  # unless config_hash changes too. Otherwise a lab can fragment a single
  # logical run into "two models" for cap accounting.
  - kind: model_hash_consistency
    max_distinct_configs: 2  # closes hash-rotation-via-config-change (round 15)

  # Wildcard total-compute cap — closes the eval-masquerade and any future
  # label-rotation attack class (round 10, 2026-04-25). All non-idle FLOPs
  # aggregate against this regardless of op_type, so the lab cannot escape
  # by inventing or relabeling op_types.
  - kind: aggregate_flop_cap
    op_type: "*"
    scope: per_job
    threshold: 1.5e19   # slightly above the 1e19 training cap; clean baseline at ~4e18

  # Idle integrity — closes the ghost-chip-idle-laundering attack class
  # (round 1). Records labeled idle must report zero FLOPs.
  - kind: idle_must_be_zero
    max_flops: 0

  # Op-type honesty (deterministic) — closes the eval-masquerade family
  # discovered in round 10. A non-training op_type with a training-shaped
  # FLOP/token ratio is structurally a relabeling attack, regardless of
  # which non-training label was used.
  - kind: op_type_flop_ratio
    training_threshold: 5.0e10

  # Closed enumeration of op_types — closes the preprocessing-masquerade
  # family discovered in round 18, where the lab invents new op_type strings
  # ("preprocessing", "staging", etc.) outside the commitment's enumerated
  # rules to escape op-typed caps and FLOP/token honesty checks.
  - kind: allowed_op_types
    allowed: [training, inference, eval, idle]

semantic_rules:
  - id: no-splitting
    description: >
      The Prover may not split a single logical training run across multiple
      job_ids to evade the aggregate_flop_cap. A "single logical run" means
      ops using the same model_hash_prefix, same code_commit, and overlapping
      operators within a 72h window. If you see multiple jobs that together
      would exceed the cap and that share model_hash_prefix + code_commit,
      flag the earliest record of the second job.

  - id: op-type-honesty
    description: >
      Records labeled op_type="inference" must have FLOP-per-token ratios
      consistent with inference (typically < 3e10 FLOP/token). Training-like
      ratios (>5e10 FLOP/token) under an inference label are suspicious and
      suggest training mislabeled to dodge the training-FLOP cap. Flag any
      inference record with flops/tokens_processed > 5e10.

  - id: dataset-provenance
    description: >
      dataset_fingerprint should remain stable for the duration of a job unless
      accompanied by a context change (new upstream_refs, new config_hash).
      Silent dataset_fingerprint swaps mid-job indicate a dataset substitution
      attack. Flag the first record where dataset_fingerprint changes without
      an accompanying config_hash change within the same job_id.

  - id: batch-token-sanity
    description: >
      tokens_processed in a window should be a reasonable function of
      batch_size × sequence_length × steps. If batch_size × sequence_length is
      an order of magnitude or more larger than tokens_processed, the batch
      size may be inflated to hide real throughput. Use the
      `suspicious_batch_records` list in the summary as a starting point and
      flag any record where batch_size * sequence_length > tokens_processed * 10.
